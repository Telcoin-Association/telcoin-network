# git-cliff config — generates CHANGELOG.md from conventional commits.
#
# Run:    make release-changelog
# Or:     git cliff -o CHANGELOG.md

[changelog]
header = """
# Changelog

All notable changes to telcoin-network are recorded here. Entries are
generated automatically from conventional commits between tags.
"""
body = """
{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first | trim }}\
            {% if commit.breaking %} **(breaking)**{% endif %}\
            {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}\
    {% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "^feat",     group = "Features" },
    { message = "^fix",      group = "Bug Fixes" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs",     group = "Documentation" },
    { message = "^test",     group = "Tests" },
    { message = "^chore",    group = "Chores" },
    { message = "^build",    group = "Build" },
    { message = "^ci",       group = "CI" },
    { message = "^revert",   group = "Reverts" },
    # Anything else still appears, grouped under "Other" so we don't silently
    # drop changes that pre-date a conventional-commit habit.
    { message = ".*",        group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
ignore_tags = ""
topo_order = false
sort_commits = "newest"
