[package]
name = "telcoin-network"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
authors.workspace = true
description.workspace = true
exclude.workspace = true

[dependencies]
telcoin-network-cli = { workspace = true }
tn-node = { workspace = true }

[features]
# Adiri-testnet build. Propagates the `adiri` feature through the whole node graph so the
# testnet-only fork logic (`tn_types::forks`, the ConsensusRegistry fork, `ADIRI_DUP_BATCH_EPOCH`)
# is actually compiled into the binary. Enabled for the `docker-adiri` image via a Docker build arg;
# default/mainnet builds omit it. See `tn_types::forks::CONSENSUS_REGISTRY_FORK_EPOCH`.
adiri = ["telcoin-network-cli/adiri", "tn-node/adiri"]
# Opt back in to reth's RocksDB storage backend (librocksdb-sys). Off by default: storage
# is MDBX-only today, so the node uses reth's zero-size `RocksDBProvider` stub and skips
# compiling the RocksDB C++ engine. Must be enabled before any storage-v2 experimentation.
rocksdb = ["telcoin-network-cli/rocksdb", "tn-node/rocksdb"]

# Faucet build (devnet). Propagates `faucet` down to `tn-reth`, the only crate with faucet-gated
# code (the unrestricted `mint` precompile used by faucets). Enabled for the `docker-devnet` image
# via a Docker build arg; default/mainnet builds omit it. `adiri` already implies faucet at the
# `tn-reth` level, so this is only needed for a faucet-without-adiri build. See `make test-faucet`.
faucet = ["tn-node/faucet"]

[lints]
workspace = true
