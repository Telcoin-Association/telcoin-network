# HorizontalPodAutoscaler driven by the gateway's in-flight request gauge.
#
# The Pods custom metric below requires prometheus-adapter (or an equivalent
# custom.metrics.k8s.io provider) to surface tn_worker_gateway_inflight_requests
# on the custom metrics API as a per-pod metric. See ../README.md for a sample
# prometheus-adapter rules snippet.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-gateway
  labels:
    app: worker-gateway
    app.kubernetes.io/name: worker-gateway
    app.kubernetes.io/part-of: telcoin-network
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: tn_worker_gateway_inflight_requests
        target:
          type: AverageValue
          averageValue: "50"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
