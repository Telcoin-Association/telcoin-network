name: Pull Request Checks
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, review_requested, ready_for_review]

# Cancel in-progress runs when a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings -D unused_extern_crates"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  # maintainers test and attest locally
  skip-maintainers:
    runs-on: ubuntu-latest
    outputs:
      is_maintainer: ${{ steps.check.outputs.is_maintainer }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          MAINTAINERS=("grantkee" "sstanfield" "MavenRain" "Huwonk")
          if [[ " ${MAINTAINERS[@]} " =~ " ${{ github.event.pull_request.user.login }} " ]]; then
            echo "is_maintainer=true" >> $GITHUB_OUTPUT
          else
            echo "is_maintainer=false" >> $GITHUB_OUTPUT
          fi

  # Format check - no compilation needed, finishes in ~30s
  fmt:
    needs: skip-maintainers
    if: >-
      needs.skip-maintainers.outputs.is_maintainer == 'false' &&
      github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read nightly version
        run: echo "RUST_NIGHTLY=$(cat rust-nightly)" >> $GITHUB_ENV

      - name: Install nightly toolchain
        run: rustup toolchain install $RUST_NIGHTLY -c rustfmt --profile minimal

      - name: Check formatting
        run: cargo +$RUST_NIGHTLY fmt --all -- --check

  # Clippy - replaces cargo check, catches more issues
  clippy:
    needs: skip-maintainers
    if: >-
      needs.skip-maintainers.outputs.is_maintainer == 'false' &&
      github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Read nightly version
        run: echo "RUST_NIGHTLY=$(cat rust-nightly)" >> $GITHUB_ENV

      - name: Install nightly toolchain
        run: rustup toolchain install $RUST_NIGHTLY -c clippy,rust-src --profile minimal

      - name: Cache dependencies
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3
        with:
          shared-key: clippy-cache
          cache-on-failure: "true"

      - name: Run clippy
        run: cargo +$RUST_NIGHTLY clippy --locked --all --all-features -- -D warnings

  # Tests - compile and run with nextest for parallel execution
  test:
    needs: skip-maintainers
    if: >-
      needs.skip-maintainers.outputs.is_maintainer == 'false' &&
      github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache dependencies
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3
        with:
          shared-key: test-cache
          cache-on-failure: "true"

      - name: Run tests
        run: cargo nextest run --locked --workspace --exclude tn-faucet --no-fail-fast --profile ci

  # Guard: rocksdb (librocksdb-sys, the entire RocksDB C++ engine and the single largest
  # native compile in the tree) must stay out of the default feature graph. It is gated
  # behind the off-by-default `rocksdb` feature; this catches a future reth bump whose
  # default set silently re-introduces it. Resolves the graph only - nothing is compiled.
  rocksdb-gate:
    needs: skip-maintainers
    if: >-
      needs.skip-maintainers.outputs.is_maintainer == 'false' &&
      github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache dependencies
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3
        with:
          shared-key: rocksdb-gate-cache
          cache-on-failure: "true"

      - name: Assert rocksdb absent from default feature graph
        run: |
          # Structured check: count rocksdb packages in the feature-resolved metadata
          # graph instead of scraping cargo's error wording. A cargo/jq failure fails
          # the assignment (bash -e -o pipefail), so infrastructure errors fail closed.
          hits=$(cargo metadata --locked --format-version 1 \
            | jq '[.resolve.nodes[].id | select(test("[/#]rocksdb@"))] | length')
          if [[ "$hits" -ne 0 ]]; then
            echo "librocksdb-sys re-entered the default dependency graph ($hits rocksdb package(s) resolved):"
            cargo tree --locked -e features -i rocksdb || true
            exit 1
          fi
          echo "rocksdb absent from the default feature graph"

  # Compile the exact feature shapes shipped in release images (see Makefile and
  # etc/Dockerfile: mainnet = no features, devnet = faucet only, testnet = adiri only).
  # Clippy's --all-features never compiles these shapes individually, so cfg-gated
  # code can break a shipped build without failing CI.
  feature-matrix:
    needs: skip-maintainers
    if: >-
      needs.skip-maintainers.outputs.is_maintainer == 'false' &&
      github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mainnet
            features: ""
          - name: faucet
            features: "--features faucet"
          - name: adiri
            features: "--features adiri"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache dependencies
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3
        with:
          shared-key: feature-${{ matrix.name }}-cache
          cache-on-failure: "true"

      - name: Check ${{ matrix.name }} feature shape
        run: cargo check --locked -p telcoin-network --bin telcoin-network ${{ matrix.features }}

  # Gate job for branch protection - depends on all checks
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, clippy, test, feature-matrix, rocksdb-gate]
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.fmt.result }}" == "failure" || \
                "${{ needs.clippy.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.feature-matrix.result }}" == "failure" || \
                "${{ needs.rocksdb-gate.result }}" == "failure" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
